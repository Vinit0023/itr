name: itr
description: "TextEraser - AI powered image text removal"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  provider: ^6.1.1
  uuid: ^4.4.0
  image: ^4.2.0
  google_fonts: ^8.0.2
  file_picker: ^8.0.0          # works on web + mobile
  path: ^1.9.0
  shared_preferences: ^2.2.0   # works on web + mobile
  image_picker: ^1.1.2

  # ── Mobile only (guarded with kIsWeb checks in code) ──────────
  receive_sharing_intent: ^1.1.2
  path_provider: ^2.1.2
  permission_handler: ^11.0.0
  image_gallery_saver_plus: ^4.0.1
  google_mlkit_text_recognition: ^0.13.0

  # ── Web only ──────────────────────────────────────────────────
  web: ^1.0.0           # modern replacement for dart:html
  http: ^1.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
